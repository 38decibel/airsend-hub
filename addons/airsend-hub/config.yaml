name: AirSend-Hub
description: All-in-one AirSend hub for Home Assistant - device inclusion, MQTT bridge and web UI in a single app.
version: "0.27.0"
slug: airsend-hub
url: https://github.com/38decibel/airsend-hub
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
init: false
boot: auto
homeassistant_api: true
ingress: true
ingress_port: 8127
panel_icon: mdi:remote
panel_title: AirSend-Hub
ports:
  33863/tcp: null
ports_description:
  33863/tcp: AirSendWebService communication (debug/tests only, not required by the app itself)
map:
  - data:rw
options:
  boxes:
    - localip: "fe80::dcf6:e5ff:fe"
      password: ""
      ipv4: ""
      gw: true
      name: "AIRSEND_"
  system:
    log_level: INFO
  mqtt: {}
schema:
  boxes:
    - localip: str
      password: str
      ipv4: str
      gw: bool
      name: str
  system:
    log_level: match(^ERROR|WARNING|INFO|DEBUG$)
  mqtt:
    host: "str?"
    port: "int?"
    ssl: "bool?"
    username: "str?"
    password: "str?"
services:
  - "mqtt:need"

