name: AirSend-Hub
description: All-in-one AirSend / AirSend Duo hub for Home Assistant - device inclusion, MQTT bridge and web UI in a single add-on (RF cover/switch/button/sensor via MQTT discovery)
version: "0.26.0"
slug: airsend-hub
url: https://github.com/38decibel/airsend-hub
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
init: false
boot: auto
homeassistant_api: true
# UI Ingress : formulaire d'ajout d'appareil (cf. inclusion_api.py). Revient
# sur la decision initiale "no Ingress UI" (cf. suivi de conception),
# uniquement pour ce flow de confirmation - le reste (etats, commandes)
# continue de passer entierement par MQTT discovery.
ingress: true
ingress_port: 8127
panel_icon: mdi:remote
panel_title: AirSend-Hub
ports:
  33863/tcp: null
ports_description:
  33863/tcp: AirSendWebService communication (debug/tests uniquement, non requis par l'addon lui-meme)
map:
  - data:rw
options:
  boxes:
    - localip: "fe80::dcf6:e5ff:fe"
      password: ""
      ipv4: ""
      gw: true
      name: "AIRSEND_"
  system:
    log_level: INFO
  mqtt: {}
schema:
  boxes:
    - localip: str
      password: str
      ipv4: str
      gw: bool
      name: str
  system:
    log_level: match(^ERROR|WARNING|INFO|DEBUG$)
  mqtt:
    host: "str?"
    port: "int?"
    ssl: "bool?"
    username: "str?"
    password: "str?"
services:
  - "mqtt:need"

# NOTE : l'option "auto_include" de l'addon d'origine (creation automatique
# et silencieuse d'entites a la reception d'une trame inconnue) n'est PAS
# reprise ici, deliberement : elle contredit la decision actee en Phase 1 de
# toujours demander confirmation utilisateur (nom + kind + domaine) avant de
# creer un appareil, pour eviter qu'un volet soit devine a tort comme une
# lumiere (ou l'inverse) sans que personne ne s'en rende compte.
