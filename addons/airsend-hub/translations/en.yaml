
configuration:
  boxes:
    name: "AirSend boxes"
    description: "Connection details are printed on the back of the device."
    fields:
      localip:
        name: "Local IP"
        description: "Link-local IPv6 address of the box (printed under the device)."
      password:
        name: "Password"
        description: "Password of the box (printed under the device)."
      ipv4:
        name: "Secondary address"
        description: "e.g. 192.168.x.x"
      gw:
        name: "GW"
        description: "Enable if the box is configured to go through the internet gateway."
      name:
        name: "Name"
        description: "The name that will be used for the MQTT device"
  system:
    name: "System"
    description: "General add-on settings."
    fields:
      log_level:
        name: "Log level"
        description: "Verbosity of the add-on logs."
  mqtt:
    name: "MQTT"
    description: >-
      (optional) MQTT configuration to connect to an external MQTT broker.
      when not configured, the built-in MQTT broker of Home Assistant will
      be used.
    fields:
      host:
        name: "Host"
      port:
        name: "Port"
      ssl:
        name: "SSL"
      username:
        name: "Username"
      password:
        name: "Password"
