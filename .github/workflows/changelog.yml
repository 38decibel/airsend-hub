name: Update changelog from PR

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: write
  pull-requests: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      # Checkout du dépôt principal (main)
      # C'est CE dépôt qui contient le script Python de confiance,
      # y compris pour les PR venant de forks (pull_request_target).
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Update changelog
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          python3 .github/scripts/update_changelog.py

      # On bascule ensuite sur la branche de la PR pour committer dessus
      - name: Checkout PR branch
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git fetch origin "$PR_HEAD_REF"
          git checkout "$PR_HEAD_REF"

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add addons/airsend-hub/CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "docs: update changelog [skip ci]"
          git push origin HEAD